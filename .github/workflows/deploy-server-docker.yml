name: Deploy Server to VPS (Docker)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/deploy-server-docker.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deploy:
    name: Build Docker Image and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/theplus1/finapp-server
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          IMAGE_NAME: ghcr.io/theplus1/finapp-server:latest
        run: |
          ssh ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} << ENDSSH
            set -e
            cd ${{ vars.SERVER_APP_DIR }}

            # Ensure directories exist for volume mounts (Docker will create them as root otherwise)
            mkdir -p logs public/exports

            # Log in to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ${IMAGE_NAME}

            # Stop and remove old container if exists
            docker stop finapp-server || true
            docker rm finapp-server || true

            # Create env file with proper escaping
            cat > /tmp/finapp.env << 'ENVEOF'
BOT_TOKEN=${{ secrets.BOT_TOKEN }}
MODE=${{ vars.MODE }}
WEBHOOK_URL=${{ vars.WEBHOOK_URL }}
PORT=${{ vars.PORT }}
MONGO_URI=${{ secrets.MONGO_URI }}
NOTIFICATION_CRON=${{ vars.NOTIFICATION_CRON }}
SLASH_API_KEY=${{ secrets.SLASH_API_KEY }}
SLASH_BASE_URL=${{ vars.SLASH_BASE_URL }}
SLASH_TIMEOUT=${{ vars.SLASH_TIMEOUT }}
SLASH_WEBHOOK_SECRET=${{ secrets.SLASH_WEBHOOK_SECRET }}
SUPER_ADMIN_TOKEN=${{ secrets.SUPER_ADMIN_TOKEN }}
REDIS_HOST=${{ vars.REDIS_HOST }}
REDIS_PORT=${{ vars.REDIS_PORT }}
EXPORT_SECRET=${{ secrets.EXPORT_SECRET }}
RESOURCE_BASE_URL=${{ vars.RESOURCE_BASE_URL }}
NODE_ENV=production
ENVEOF

            # Run new container
            docker run -d \
              --name finapp-server \
              --restart unless-stopped \
              -p 3000:3000 \
              -v ${{ vars.SERVER_APP_DIR }}/logs:/app/logs \
              -v ${{ vars.SERVER_APP_DIR }}/public/exports:/app/public/exports \
              --env-file /tmp/finapp.env \
              ${IMAGE_NAME}
            
            # Clean up env file
            rm -f /tmp/finapp.env

            # Clean up old images (keep last 3)
            docker image prune -af --filter "until=72h"

            echo "✅ Deployment complete"
            docker ps --filter "name=finapp-server"
          ENDSSH
