name: Deploy Customer Web to VPS - Prod

on:
  push:
    branches:
      - main
    paths:
      - 'apps/customer-web/**'
      - 'packages/**'
      - '.github/workflows/deploy-customer-web-prod.yml'
  workflow_dispatch:

jobs:
  deploy-customer-web:
    name: Deploy Customer Web Application
    runs-on: ubuntu-latest
    environment: production-v2
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for customer-web
        run: |
          cat > apps/customer-web/.env.production << EOF
          API_URL=${{ vars.CUSTOMER_API_URL }}
          EOF

      - name: Build customer-web
        run: npm run build:customer

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare standalone output
        run: |
          cp -r apps/customer-web/.next/static apps/customer-web/.next/standalone/apps/customer-web/.next/static
          cp -r apps/customer-web/public apps/customer-web/.next/standalone/apps/customer-web/public 2>/dev/null || true

      - name: Sync standalone output to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/customer-web/.next/standalone/ ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.CUSTOMER_APP_DIR }}/

      - name: Deploy customer-web to VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e

            # Reload customer-web in the `deploy` user's PM2 daemon, which
            # is the one nginx proxies to (port 3002). Previous workflow
            # used `pm2 restart` in the SSH user's context, which silently
            # hit the wrong PM2 daemon and left the process serving stale
            # code. Always target deploy's PM2 explicitly via ecosystem.
            CMD="pm2 reload /home/deploy/apps/ecosystem.config.js --only customer-web --update-env && pm2 save"

            echo "Reloading customer-web (ssh user: $(whoami))..."
            if [ "$(whoami)" = "deploy" ]; then
              bash -c "$CMD"
            else
              su - deploy -c "$CMD"
            fi

            # Verify: curl the local port nginx proxies to and make sure
            # /login serves the new HTML. If the reload silently targeted
            # the wrong pm2 daemon, this smoke test will catch it.
            sleep 3
            echo "Smoke test /login on http://127.0.0.1:3002 ..."
            BODY=$(curl -sS --max-time 10 http://127.0.0.1:3002/login || true)
            if echo "$BODY" | grep -q 'Username or Email'; then
              echo "OK: /login serves new HTML"
            else
              echo "FAIL: /login not reachable or serving stale HTML" >&2
              echo "--- first 500 bytes of response ---" >&2
              echo "$BODY" | head -c 500 >&2
              echo "--- pm2 logs customer-web (deploy) ---" >&2
              su - deploy -c "pm2 logs customer-web --lines 20 --nostream" >&2 || true
              exit 1
            fi

            echo "Deployment complete"
          ENDSSH
