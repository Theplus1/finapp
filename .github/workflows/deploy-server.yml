name: Deploy Server to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-server:
    name: Deploy Server Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file for server
        run: |
          cat > apps/server/.env << EOF
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          MODE=${{ vars.MODE }}
          WEBHOOK_URL=${{ vars.WEBHOOK_URL }}
          PORT=${{ vars.PORT }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          NOTIFICATION_CRON=${{ vars.NOTIFICATION_CRON }}
          SLASH_API_KEY=${{ secrets.SLASH_API_KEY }}
          SLASH_BASE_URL=${{ vars.SLASH_BASE_URL }}
          SLASH_TIMEOUT=${{ vars.SLASH_TIMEOUT }}
          SLASH_WEBHOOK_SECRET=${{ secrets.SLASH_WEBHOOK_SECRET }}
          EOF

      - name: Build server
        run: npm run build:server

      - name: Sync server files to VPS
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'src' \
            --exclude 'test' \
            --exclude '.turbo' \
            --exclude 'coverage' \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/server/ ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.SERVER_APP_DIR }}/

      - name: Deploy server to VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          SERVER_APP_DIR: ${{ vars.SERVER_APP_DIR }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            
            echo "🚀 Starting server deployment..."
            
            # Navigate to server directory
            cd ${{ vars.SERVER_APP_DIR }}
            
            # Verify files
            echo "📦 Verifying deployment files..."
            if [ -d "dist" ] && [ -f "package.json" ]; then
              echo "✅ Build files verified"
            else
              echo "❌ Build files missing!"
              exit 1
            fi
            
            # Install production dependencies
            echo "📦 Installing production dependencies..."
            npm install --omit=dev --legacy-peer-deps
            
            # Stop existing PM2 process
            echo "🛑 Stopping existing server process..."
            pm2 stop server || true
            pm2 delete server || true
            
            # Start server with PM2
            echo "🏗️  Starting server with PM2..."
            pm2 start dist/main.js --name server
            
            # Save PM2 process list
            pm2 save
            
            # Wait for app to start
            echo "⏳ Waiting for server to start..."
            sleep 5
            
            # Check PM2 status
            echo "✅ Server deployment complete! PM2 status:"
            pm2 status
            
            # Show recent logs
            echo "📋 Recent logs:"
            pm2 logs server --lines 20 --nostream
          ENDSSH

      - name: Verify Server Deployment
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          SERVER_APP_DIR: ${{ vars.SERVER_APP_DIR }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            # Check if PM2 process is running
            if pm2 list | grep -q "server.*online"; then
              echo "✅ Server is running"
              
              # Test if the app responds (if you have a health endpoint)
              sleep 2
              if curl -f http://localhost:${{ vars.PORT }}/health > /dev/null 2>&1; then
                echo "✅ Server is responding to requests"
                exit 0
              else
                echo "⚠️  Server is running but not responding yet"
                exit 0
              fi
            else
              echo "❌ Server is not running"
              exit 1
            fi
          ENDSSH

      - name: Notify on Success
        if: success()
        run: |
          echo "✅ Server deployment successful!"
          echo "Server is now running on VPS"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Server deployment failed!"
          echo "Check the logs above for details"
