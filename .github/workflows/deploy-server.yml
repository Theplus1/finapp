name: Deploy Server to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-server:
    name: Deploy Server Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build:server

      - name: Prepare deployment package
        run: |
          cd apps/server
          
          # Install production dependencies
          rm -rf node_modules
          npm ci --omit=dev --legacy-peer-deps

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy built artifacts to VPS
        run: |
          rsync -avz --delete \
            --include 'dist/***' \
            --include 'node_modules/***' \
            --include 'package*.json' \
            --include 'public/***' \
            --exclude '*' \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/server/ ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.SERVER_APP_DIR }}/

      - name: Create .env and restart on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          SERVER_APP_DIR: ${{ vars.SERVER_APP_DIR }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            cd ${{ vars.SERVER_APP_DIR }}

            # Create .env if it doesn't exist
            if [ ! -f .env ]; then
              echo "📝 Creating .env file..."
              cat > .env << 'EOF'
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          MODE=${{ vars.MODE }}
          WEBHOOK_URL=${{ vars.WEBHOOK_URL }}
          PORT=${{ vars.PORT }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          NOTIFICATION_CRON=${{ vars.NOTIFICATION_CRON }}
          SLASH_API_KEY=${{ secrets.SLASH_API_KEY }}
          SLASH_BASE_URL=${{ vars.SLASH_BASE_URL }}
          SLASH_TIMEOUT=${{ vars.SLASH_TIMEOUT }}
          SLASH_WEBHOOK_SECRET=${{ secrets.SLASH_WEBHOOK_SECRET }}
          SUPER_ADMIN_TOKEN=${{ secrets.SUPER_ADMIN_TOKEN }}
          REDIS_HOST=${{ vars.REDIS_HOST }}
          REDIS_PORT=${{ vars.REDIS_PORT }}
          EXPORT_SECRET=${{ secrets.EXPORT_SECRET }}
          RESOURCE_BASE_URL=${{ vars.RESOURCE_BASE_URL }}
          EOF
            fi

            echo "🔄 Restarting server..."
            pm2 restart server || pm2 start dist/main.js --name server
            pm2 save

            echo "✅ Deployment complete"
            pm2 status
          ENDSSH
