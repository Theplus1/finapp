name: Deploy Server to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

jobs:
  deploy-server:
    name: Deploy Server Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=server

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file for server
        run: |
          cat > apps/server/.env << EOF
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          MODE=${{ vars.MODE }}
          WEBHOOK_URL=${{ vars.WEBHOOK_URL }}
          PORT=${{ vars.PORT }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          NOTIFICATION_CRON=${{ vars.NOTIFICATION_CRON }}
          SLASH_API_KEY=${{ secrets.SLASH_API_KEY }}
          SLASH_BASE_URL=${{ vars.SLASH_BASE_URL }}
          SLASH_TIMEOUT=${{ vars.SLASH_TIMEOUT }}
          SLASH_WEBHOOK_SECRET=${{ secrets.SLASH_WEBHOOK_SECRET }}
          SUPER_ADMIN_TOKEN=${{ secrets.SUPER_ADMIN_TOKEN }}
          REDIS_HOST=${{ vars.REDIS_HOST }}
          REDIS_PORT=${{ vars.REDIS_PORT }}
          EXPORT_SECRET=${{ secrets.EXPORT_SECRET }}
          RESOURCE_BASE_URL=${{ vars.RESOURCE_BASE_URL }}
          EOF

      # 👇 Ensure fresh build (clean dist and disable cache)
      - name: Clean old dist
        run: rm -rf apps/server/dist

      - name: Build server
        run: |
          # Disable Turbo cache to ensure full rebuild
          TURBO_FORCE=true npm run build:server

      # 👇 Verify build actually produced files
      - name: Debug build output
        run: |
          echo "Listing apps/server/dist folder:"
          ls -R apps/server/dist || echo "❌ dist folder missing"

      - name: Sync server files to VPS
        if: success()
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'src' \
            --exclude 'public' \
            --exclude 'test' \
            --exclude '.turbo' \
            --exclude 'coverage' \
            --exclude 'tsconfig*.json' \
            --exclude 'nest-cli.json' \
            --exclude 'jest.config.js' \
            --exclude '*.spec.ts' \
            --exclude '.eslintrc.js' \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/server/ ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.SERVER_APP_DIR }}/

      - name: Deploy server to VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          SERVER_APP_DIR: ${{ vars.SERVER_APP_DIR }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -ex
            cd ${{ vars.SERVER_APP_DIR }}

            echo "📦 Installing dependencies..."
            npm install --omit=dev --legacy-peer-deps

            echo "🔄 Restarting server..."
            pm2 reload server --update-env || pm2 start dist/main.js --name server --cwd ${{ vars.SERVER_APP_DIR }}
            pm2 save

            echo "✅ Deployment complete"
            pm2 status
          ENDSSH
