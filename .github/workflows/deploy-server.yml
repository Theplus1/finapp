name: Deploy Server to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-server:
    name: Deploy Server Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build --filter=server

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file for server
        run: |
          cat > apps/server/.env << EOF
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          MODE=${{ vars.MODE }}
          WEBHOOK_URL=${{ vars.WEBHOOK_URL }}
          PORT=${{ vars.PORT }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          NOTIFICATION_CRON=${{ vars.NOTIFICATION_CRON }}
          SLASH_API_KEY=${{ secrets.SLASH_API_KEY }}
          SLASH_BASE_URL=${{ vars.SLASH_BASE_URL }}
          SLASH_TIMEOUT=${{ vars.SLASH_TIMEOUT }}
          SLASH_WEBHOOK_SECRET=${{ secrets.SLASH_WEBHOOK_SECRET }}
          EOF

      - name: Sync server files to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'logs' \
            --exclude '.next' \
            --exclude 'coverage' \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/server/ ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.SERVER_APP_DIR }}/

      - name: Sync shared packages to VPS
        run: |
          rsync -avz \
            --exclude 'node_modules' \
            -e "ssh -o StrictHostKeyChecking=no" \
            package.json package-lock.json ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.SERVER_APP_DIR }}/

      - name: Deploy server to VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          SERVER_APP_DIR: ${{ vars.SERVER_APP_DIR }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            
            echo "🚀 Starting server deployment..."
            
            # Navigate to server directory
            cd ${{ vars.SERVER_APP_DIR }}
            
            # Stop existing containers
            echo "🛑 Stopping existing server containers..."
            docker-compose -f docker-compose.prod.yml down || true
            
            # Remove old images to free space
            echo "🗑️  Cleaning up old images..."
            docker image prune -f
            
            # Build and start containers
            echo "🏗️  Building and starting server containers..."
            docker-compose -f docker-compose.prod.yml up -d --build
            
            # Wait for container to be healthy
            echo "⏳ Waiting for server to start..."
            sleep 10
            
            # Check container status
            echo "✅ Server deployment complete! Container status:"
            docker-compose -f docker-compose.prod.yml ps
            
            # Show recent logs
            echo "📋 Recent logs:"
            docker-compose -f docker-compose.prod.yml logs --tail=20
          ENDSSH

      - name: Verify Server Deployment
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          SERVER_APP_DIR: ${{ vars.SERVER_APP_DIR }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            cd ${{ vars.SERVER_APP_DIR }}
            
            # Check if container is running
            if [ $(docker-compose -f docker-compose.prod.yml ps -q | wc -l) -gt 0 ]; then
              echo "✅ Server container is running"
              exit 0
            else
              echo "❌ Server container is not running"
              exit 1
            fi
          ENDSSH

      - name: Notify on Success
        if: success()
        run: |
          echo "✅ Server deployment successful!"
          echo "Server is now running on VPS"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Server deployment failed!"
          echo "Check the logs above for details"
