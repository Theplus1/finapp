name: Deploy Admin Web to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin-web/**'
      - 'packages/**'
      - '.github/workflows/deploy-admin-web.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-admin-web:
    name: Deploy Admin Web Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for admin-web
        run: |
          cat > apps/admin-web/.env.production << EOF
          API_KEY=${{ secrets.SLASH_API_KEY }}
          API_URL=${{ vars.SLASH_BASE_URL }}
          EOF

      - name: Build admin-web
        run: npm run build:admin

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync admin-web files to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'coverage' \
            --exclude '.env.local' \
            -e "ssh -o StrictHostKeyChecking=no" \
            apps/admin-web/ ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.ADMIN_APP_DIR }}/

      - name: Sync shared packages to VPS
        run: |
          rsync -avz \
            --exclude 'node_modules' \
            -e "ssh -o StrictHostKeyChecking=no" \
            package.json package-lock.json ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.ADMIN_APP_DIR }}/

      - name: Deploy admin-web to VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          ADMIN_APP_DIR: ${{ vars.ADMIN_APP_DIR }}
          ADMIN_PORT: ${{ vars.ADMIN_PORT }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e
            
            echo "🚀 Starting admin-web deployment..."
            
            # Navigate to admin-web directory
            cd ${{ vars.ADMIN_APP_DIR }}
            
            # Install production dependencies
            echo "📦 Installing dependencies..."
            npm ci --omit=dev
            
            # Stop existing PM2 process
            echo "🛑 Stopping existing admin-web process..."
            pm2 stop admin-web || true
            pm2 delete admin-web || true
            
            # Start the Next.js app with PM2
            echo "🏗️  Starting admin-web with PM2..."
            pm2 start npm --name "admin-web" -- start -- -p ${{ vars.ADMIN_PORT }}
            
            # Save PM2 process list
            pm2 save
            
            # Wait for app to start
            echo "⏳ Waiting for admin-web to start..."
            sleep 5
            
            # Check PM2 status
            echo "✅ Admin-web deployment complete! PM2 status:"
            pm2 status
            
            # Show recent logs
            echo "📋 Recent logs:"
            pm2 logs admin-web --lines 20 --nostream
          ENDSSH

      - name: Verify Admin Web Deployment
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          ADMIN_APP_DIR: ${{ vars.ADMIN_APP_DIR }}
          ADMIN_PORT: ${{ vars.ADMIN_PORT }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            # Check if PM2 process is running
            if pm2 list | grep -q "admin-web.*online"; then
              echo "✅ Admin-web is running"
              
              # Test if the app responds
              sleep 2
              if curl -f http://localhost:${{ vars.ADMIN_PORT }} > /dev/null 2>&1; then
                echo "✅ Admin-web is responding to requests"
                exit 0
              else
                echo "⚠️  Admin-web is running but not responding yet"
                exit 0
              fi
            else
              echo "❌ Admin-web is not running"
              exit 1
            fi
          ENDSSH

      - name: Notify on Success
        if: success()
        run: |
          echo "✅ Admin-web deployment successful!"
          echo "Admin-web is now running on VPS at port ${{ vars.ADMIN_PORT }}"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Admin-web deployment failed!"
          echo "Check the logs above for details"
